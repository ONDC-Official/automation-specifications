        validStates:
          - Pending
          - Searching-for-Agent
          - Agent-assigned
          - At-pickup
          - Order-picked-up
          - Out-for-delivery
          - At-delivery
          - Order-delivered
          - Cancelled
          - RTO
          - RTO-Initiated
          - RTO-Disposed
          - RTO-Delivered
        fulfillmentState: $.message.order.fulfillments[*].state.descriptor.code
        _CONTINUE_: "!(domain all in validDomain)"
        _RETURN_: fulfillmentState all in validStates
      - _NAME_: valid_LOG11_fulfillment_states
        _DESCRIPTION_: Fulfillment state (fulfillments.state.descriptor.code) should be valid for ONDC:LOG11
        domain: $.context.domain
        validDomain:
          - ONDC:LOG11
        validStates:
          - Pending
          - Searching-for-Agent
          - Agent-assigned
          - Out-for-pickup
          - Pickup-failed
          - Pickup-rescheduled
          - Order-picked-up
          - In-transit
          - At-destination-hub
          - Out-for-delivery
          - Delivery-failed
          - Delivery-rescheduled
          - Order-delivered
          - Cancelled
          - RTO
          - RTO-Initiated
          - RTO-Disposed
          - RTO-Delivered
        fulfillmentState: $.message.order.fulfillments[*].state.descriptor.code
        _CONTINUE_: "!(domain all in validDomain)"
        _RETURN_: fulfillmentState all in validStates
      - _NAME_: order_picked_up_timestamp
        _DESCRIPTION_: Order pickup timestamp in fulfillments/start/time/timestamp should be present when order is picked up
        pickupTimestamp: $.message.order.fulfillments[?(@.type=='Delivery')].start.time.timestamp
        fulfillmentState: $.message.order.fulfillments[?(@.type=='Delivery')].state.descriptor.code
        state:
          - Order-picked-up
          - Out-for-delivery
          - Order-delivered
          - At-location
          - In-transit
          - RTO
        _CONTINUE_: "!(fulfillmentState all in state)"
        _RETURN_: pickupTimestamp are present
      - _NAME_: order_delivered_timestamp
        _DESCRIPTION_: Order pickup timestamp in fulfillments/start/time/timestamp and delivery timestamp in fulfillments/end/time/timestamp should be present when order is delivered
        pickupTimestamp: $.message.order.fulfillments[?(@.type=='Delivery')].start.time.timestamp
        deliveryTimestamp: $.message.order.fulfillments[?(@.type=='Delivery')].end.time.timestamp
        fulfillmentState: $.message.order.fulfillments[?(@.type=='Delivery')].state.descriptor.code
        state:
          - Order-delivered
        _CONTINUE_: "!(fulfillmentState all in state)"
        _RETURN_: pickupTimestamp are present && deliveryTimestamp are present
      - _NAME_: rto_initiated_timestamp
        _DESCRIPTION_: RTO-Initiated timestamp in fulfillments/start/time/timestamp (RTO fulfillment) should be present when RTO is initiated
        rtoInitiatedTimestamp: $.message.order.fulfillments[?(@.type=='RTO')].start.time.timestamp
        fulfillmentState: $.message.order.fulfillments[?(@.type=='RTO')].state.descriptor.code
        state:
          - RTO-Initiated
        _CONTINUE_: "!(fulfillmentState all in state)"
        _RETURN_: rtoInitiatedTimestamp are present
      - _NAME_: rto_delivery_timestamp
        _DESCRIPTION_: RTO-Initiated timestamp in fulfillments/start/time/timestamp and RTO delivery timestamp in fulfillments/end/time/timestamp (RTO fulfillment) should be present when RTO fulfillment reaches its terminal state
        rtoInitiatedTimestamp: $.message.order.fulfillments[?(@.type=='RTO')].start.time.timestamp
        rtoDeliveredTimestamp: $.message.order.fulfillments[?(@.type=='RTO')].end.time.timestamp
        fulfillmentState: $.message.order.fulfillments[?(@.type=='RTO')].state.descriptor.code
        state:
          - RTO-Delivered
          - RTO-Disposed
        _CONTINUE_: "!(fulfillmentState all in state)"
        _RETURN_: rtoInitiatedTimestamp are present && rtoDeliveredTimestamp are present
      - _NAME_: start_address_validations
        _DESCRIPTION_: Valid address should be sent in fulfillments/start/location
        startLocation: $.message.order.fulfillments[?(@.type=='Delivery' || @.type=='Return' || @.type=='FTL' || @.type=='PTL')].start.location.address.city
        _RETURN_: startLocation are present
      - _NAME_: end_address_validations
