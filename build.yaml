components:
  securitySchemes:
    SubscriberAuth:
      type: apiKey
      in: header
      name: Authorization
      description: "Signature of message body using Buyer App or Seller App subscriber's signing public key. <br/><br/>Format:<br/><br/><code>Authorization : Signature keyId=\"{subscriber_id}|{unique_key_id}|{algorithm}\",algorithm=\"ed25519\",created=\"1606970629\",expires=\"1607030629\",headers=\"(created) (expires) digest\",signature=\"Base64(signing string)\"</code>"
    GatewaySubscriberAuth:
      type: apiKey
      in: header
      name: Proxy-Authorization
      description: "Signature of message body + BuyerApp/SellerApp's Authorization header using Gateway's signing public key. Format:<br/><br/><code>Proxy-Authorization : Signature keyId=\"{subscriber_id}|{unique_key_id}|{algorithm}\",algorithm=\"ed25519\",created=\"1606970629\",expires=\"1607030629\",headers=\"(created) (expires) digest\",signature=\"Base64(signing string)\"</code><p><b>Note:</b>This header will be deprecated soon and will no longer be supported in future releases. New implementors are requested to use the X-Gateway-Authorization header. Existing implementations are requested to migrate their header to the new header. The deprecation date will be set after discussion as per the standard specification governance process.</p>"
    GatewaySubscriberAuthNew:
      type: apiKey
      in: header
      name: X-Gateway-Authorization
      description: "Signature of message body + BuyerApp/SellerApp's Authorization header using Gateway's signing public key. Format:<br/><br/><code>X-Gateway-Authorization : Signature keyId=\"{subscriber_id}|{unique_key_id}|{algorithm}\",algorithm=\"ed25519\",created=\"1606970629\",expires=\"1607030629\",headers=\"(created) (expires) digest\",signature=\"Base64(signing string)\"</code>"
  schemas:
    Ack:
      description: Describes the ACK response
      type: object
      properties:
        status:
          type: string
          description: Describe the status of the ACK response. If schema validation passes, status is ACK else it is NACK
          enum:
            - ACK
            - NACK
        tags:
          description: A list of tags containing any additional information sent along with the Acknowledgement.
          type: array
          items:
            $ref: "#/components/schemas/TagGroup"
      required:
        - status
      additionalProperties: false
    AdditionalInfoRequired:
      type: object
      properties:
        info_required:
          type: object
          $ref: "#/components/schemas/SupplementaryInformation"
        info_provided:
          type: object
          $ref: "#/components/schemas/SupplementaryInformation"
    AddOn:
      description: Describes an add-on
      type: object
      properties:
        id:
          type: string
          description: ID of the add-on. This follows the syntax {item.id}/add-on/{add-on unique id} for item specific add-on OR
        descriptor:
          $ref: "#/components/schemas/Descriptor"
        price:
          $ref: "#/components/schemas/Price"
      additionalProperties: false
    Address:
      description: Describes an address
      type: object
      properties:
        door:
          type: string
          description: Door / Shop number of the address
        name:
          type: string
          description: Name of address if applicable. Example, shop name
        building:
          type: string
          description: Name of the building or block
        street:
          type: string
          description: Street name or number
        locality:
          type: string
          description: Name of the locality, apartments
        ward:
          type: string
          description: Name or number of the ward if applicable
        city:
          type: string
          description: City name
        state:
          type: string
          description: State name
        country:
          type: string
          description: Country name
        area_code:
          type: string
          description: Area code. This can be Pincode, ZIP code or any equivalent
      additionalProperties: false
    Agent:
      description: Describes an order executor
      type: object
      properties:
        phone:
          type: string
          description: Phone number
        name:
          type: string
          description: Agent name
    Authorization:
      description: Describes an authorization mechanism
      type: object
      properties:
        type:
          type: string
          description: Type of authorization mechanism used
        token:
          type: string
          description: Token used for authorization
        valid_from:
          type: string
          format: date-time
          description: Timestamp in RFC3339 format from which token is valid
        valid_to:
          type: string
          format: date-time
          description: Timestamp in RFC3339 format until which token is valid
        status:
          type: string
          description: Status of the token
      additionalProperties: false
    Actors:
      description: Describes the actors involved in the transaction
      type: array
      items:
        type: object
      properties:
        id:
          description: Describes id of the actors that are their
          type: string
        type:
          description: Describes the type of actor
          type: string
        info:
          description: Describes the information about actor
          type: object
          properties:
            person:
              $ref: "#/components/schemas/Person"
            contact:
              $ref: "#/components/schemas/Contact"
            org:
              type: object
      additionalProperties: false
    Action:
      type: object
      properties:
        id:
          description: Describes id of the action
          type: string
        ref_id:
          description: Describes the reference id
          type: string
        ref_type:
          description: Describes the refence type
          type: string
        descriptor:
          allOf:
            - $ref: "#/components/schemas/DescriptorIgm"
            - type: object
              properties:
                code:
                  type: string
                  enum:
                    - OPEN
                    - PROCESSING
                    - CLOSED
                    - CASCADED
                    - INFO_REQUESTED
                    - INFO_PROCESSING
                    - INFO_PROVIDED
                    - INFO_NOT_AVAILABLE
                    - RESOLUTION_PROPOSED
                    - RESOLUTION_FORWARDED
                    - RESOLUTION_PROCESSING
                    - RESOLUTION_ACCEPTED
                    - RESOLUTION_REJECTED
                    - RESOLVED
        updated_at:
          type: string
          format: date-time
          description: Timestamp in RFC3339 format when the action was updated
        action_by:
          type: string
          description: Describes the actor who performed the action
        actor_details:
          type: object
          properties:
            name:
              description: Describes id of the actor
              type: string
        tags:
          type: array
          description: List of tag objects
          items:
            type: object
            properties:
              descriptor:
                type: object
                properties:
                  code:
                    type: string
                    description: Descriptor code of the tag group
                required:
                  - code
              list:
                type: array
                description: List of key–value tag entries
                items:
                  type: object
                  properties:
                    descriptor:
                      type: object
                      properties:
                        code:
                          type: string
                          description: Descriptor code of the individual tag
                      required:
                        - code
                    value:
                      type: string
                      description: Value of the tag
                      enum:
                        - THUMBS_UP
                        - THUMBS_DOWN
                  required:
                    - descriptor
                    - value
            required:
              - descriptor
              - list
      additionalProperties: false
    Billing:
      description: Describes a billing event
      type: object
      properties:
        name:
          description: Personal details of the customer needed for billing.
          type: string
        organization:
          $ref: "#/components/schemas/Organization"
        address:
          $ref: "#/components/schemas/Address"
        email:
          type: string
          format: email
        phone:
          type: string
        time:
          $ref: "#/components/schemas/Time"
        tax_number:
          description: GST number
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      additionalProperties: false
    Cancellation:
      description: Describes a cancellation event
      type: object
      properties:
        type:
          type: string
          enum:
            - full
            - partial
        ref_id:
          type: string
        policies:
          type: array
          items:
            $ref: "#/components/schemas/Policy"
        time:
          type: string
          format: date-time
        cancelled_by:
          type: string
        reason:
          $ref: "#/components/schemas/Option"
        selected_reason:
          type: object
          properties:
            id:
              $ref: "#/components/schemas/Option/properties/id"
          additionalProperties: false
        additional_description:
          $ref: "#/components/schemas/Descriptor"
      additionalProperties: false
    CancellationTerm:
      description: Describes the cancellation terms of an item or an order. This can be referenced at an item or order level. Item-level cancellation terms can override the terms at the order level.
      type: object
      properties:
        reason_required:
          description: Indicates whether a reason is required to cancel the order
          type: boolean
        refund_eligible:
          description: Indicates if cancellation will result in a refund
          type: boolean
        return_eligible:
          description: Indicates if cancellation will result in a return to origin
          type: boolean
        fulfillment_state:
          description: The state of fulfillment during which these terms are applicable.
          allOf:
            - $ref: "#/components/schemas/State"
        return_policy:
          description: Describes the return policy of an item or an order
          type: object
          properties:
            return_eligible:
              description: Indicates whether the item is eligible for return
              type: boolean
            return_within:
              description: Applicable only for buyer managed returns where the buyer has to return the item to the origin before a certain date-time, failing which they will not be eligible for refund.
              allOf:
                - $ref: "#/components/schemas/Time"
            return_location:
              $ref: "#/components/schemas/Location"
            fulfillment_managed_by:
              enum:
                - customer
                - provider
          additionalProperties: false
        refund_policy:
          type: object
          properties:
            refund_eligible:
              description: Indicates if cancellation will result in a refund
              type: boolean
            refund_within:
              description: Time within which refund will be processed after successful cancellation.
              allOf:
                - $ref: "#/components/schemas/Time"
            refund_amount:
              $ref: "#/components/schemas/Price"
          additionalProperties: false
        cancel_by:
          description: Information related to the time of cancellation.
          allOf:
            - $ref: "#/components/schemas/Time"
        cancellation_fee:
          $ref: "#/components/schemas/Fee"
        xinput_required:
          $ref: "#/components/schemas/XInput"
        xinput_response:
          $ref: "#/components/schemas/XInputResponse"
        external_ref:
          $ref: "#/components/schemas/MediaFile"
      additionalProperties: false
    Catalog:
      description: Describes a Seller App catalog
      type: object
      properties:
        bpp/descriptor:
          $ref: "#/components/schemas/Descriptor"
        bpp/categories:
          type: array
          items:
            $ref: "#/components/schemas/Category"
        bpp/fulfillments:
          type: array
          items:
            $ref: "#/components/schemas/Fulfillment"
        payments:
          type: array
          items:
            $ref: "#/components/schemas/OnSearchPayment"
        bpp/offers:
          type: array
          items:
            $ref: "#/components/schemas/Offer"
        bpp/providers:
          type: array
          items:
            $ref: "#/components/schemas/Provider"
        exp:
          type: string
          description: Time after which catalog has to be refreshed
          format: date-time
        tags:
          type: array
          items:
            $ref: "#/components/schemas/TagGroup"
      additionalProperties: false
    Category:
      description: Describes a category.
      type: object
      properties:
        id:
          type: string
          description: Unique id of the category
          enum:
            - Express Delivery
            - Standard Delivery
            - Immediate Delivery
            - Same Day Delivery
            - Next Day Delivery
            - Instant Delivery
        parent_category_id:
          type: string
          description: Unique id of the parent category - Express delivery - Standard Delivery
        descriptor:
          $ref: "#/components/schemas/Descriptor"
        time:
          $ref: "#/components/schemas/Time"
        tags:
          type: array
          items:
            $ref: "#/components/schemas/TagGroup"
      additionalProperties: false
    Circle:
      description: Describes a circular area on the map
      type: object
      properties:
        gps:
          $ref: "#/components/schemas/Gps"
        radius:
          $ref: "#/components/schemas/Scalar"
      required:
        - gps
        - radius
      additionalProperties: false
    City:
      description: Describes a city
      type: object
      properties:
        name:
          type: string
          description: Name of the city
        code:
          type: string
          description: Codification of city code will be using the std code of the city e.g. for Bengaluru, city code is 'std:080'
      additionalProperties: false
    Complainant:
      description: |
        - Describes an entity that raises a complaint with an interfacing app. 
        - The complainant may be an end user (buyer or seller) or a network participant (buyer app/ seller app/ logistic services  provider app)
      type: object
      properties:
        person:
          $ref: "#/components/schemas/Person"
        contact:
          allOf:
            - $ref: "#/components/schemas/Contact"
            - type: object
              required:
                - phone
      required:
        - contact
      additionalProperties: false
    ComplainantAction:
      type: object
      properties:
        complainant_action:
          description: |
            Describes the action taken by the complainant who has raised the issue. 
            the value should be populated when the complainant has taken any of the below actions to anotate the action taken. the actions can be, 
            ### Actions
            1. Complainant can ```open``` the issue if he isn't satisfied with the products or services he has purchased or used 
            2. Complainant can ```escalate``` the issue if he isn't satisfied with the issue resolution
            3. Complainant can ```close``` the issue if he doesn't expect any more additonal action on the issue and he is satisfied with the resolution/actions taken on the issue till the time of closure of the issue.
          type: string
          enum:
            - OPEN
            - ESCALATE
            - CLOSE
        updated_at:
          description: timestamp for the capturing the time an issue status was last updated
          type: string
          format: date-time
        updated_by:
          $ref: "#/components/schemas/Organization"
        short_desc:
          description: details of the remarks when the issue status is changed, can be captured when the complainant triggers an action
          type: string
        tags:
          description: details of the remarks when the issue status is changed, can be captured when the complainant triggers an action
          type: object
    Contact:
      type: object
      properties:
        phone:
          type: string
        email:
          type: string
        tags:
          type: array
          items:
            $ref: "#/components/schemas/TagGroup"
      additionalProperties: false
    Context:
      description: Describes a ONDC message context
      type: object
      properties:
        domain:
          $ref: "#/components/schemas/Domain"
        country:
          $ref: "#/components/schemas/Country/properties/code"
        city:
          $ref: "#/components/schemas/City/properties/code"
        action:
          type: string
          description: Defines the ONDC API call. Any actions other than the enumerated actions are not supported by ONDC Protocol
          enum:
            - search
            - select
            - init
            - confirm
            - update
            - status
            - track
            - cancel
            - rating
            - support
            - on_search
            - on_select
            - on_init
            - on_confirm
            - on_update
            - on_status
            - on_track
            - on_cancel
            - on_rating
            - on_support
        core_version:
          type: string
          description: Version of ONDC core API specification being used
        bap_id:
          type: string
          description: Unique id of the Buyer App. By default it is the fully qualified domain name of the Buyer App
        bap_uri:
          type: string
          format: uri
          description: URI of the Buyer App for accepting callbacks. Must have the same domain name as the bap_id
        bpp_id:
          type: string
          description: Unique id of the Seller App. By default it is the fully qualified domain name of the Seller App, mandatory for all peer-to-peer API requests, i.e. except search and on_search
        bpp_uri:
          type: string
          format: uri
          description: URI of the Seller App. Must have the same domain name as the bap_id, mandatory for all peer-to-peer API requests, i.e. except search and on_search
        transaction_id:
          type: string
          description: This is a unique value which persists across all API calls from search through confirm
        message_id:
          type: string
          description: This is a unique value which persists during a request / callback cycle
        timestamp:
          type: string
          format: date-time
          description: Time of request generation in RFC3339 format
        key:
          type: string
          description: The encryption public key of the sender
        ttl:
          type: string
          description: Timestamp for which this message holds valid in ISO8601 durations format - Outer limit for ttl for search, select, init, confirm, status, track, cancel, update, rating, support is 'PT30S' which is 30 seconds, different buyer apps can change this to meet their UX requirements, but it shouldn't exceed this outer limit
      required:
        - domain
        - action
        - core_version
        - bap_id
        - bap_uri
        - transaction_id
        - message_id
        - city
        - country
        - timestamp
      additionalProperties: false
    Country:
      description: Describes a country.
      type: object
      properties:
        name:
          type: string
          description: Name of the country
        code:
          type: string
          description: Country code as per ISO 3166 Alpha-3 code format
      additionalProperties: false
    DecimalValue:
      description: Describes a decimal value
      type: string
      pattern: "[+-]?([0-9]*[.])?[0-9]+"
    Descriptor:
      description: Describes the description of a real-world object.
      type: object
      properties:
        name:
          type: string
        code:
          type: string
        symbol:
          type: string
        short_desc:
          type: string
        long_desc:
          type: string
        additional_desc:
          type: object
          properties:
            url:
              type: string
            content_type:
              type: string
              enum:
                - text/plain
                - text/html
                - application/json
          additionalProperties: false
        images:
          type: array
          items:
            $ref: "#/components/schemas/Image"
        media:
          type: array
          items:
            $ref: "#/components/schemas/MediaFile"
        audio:
          type: string
          format: uri
        3d_render:
          type: string
          format: uri
        tags:
          description: A list of tags containing any additional information sent along with the Acknowledgement.
          type: array
          items:
            $ref: "#/components/schemas/TagGroup"
      additionalProperties: false
    DescriptorIgm:
      description: Describes the description of a real-world object.
      type: object
      properties:
        name:
          type: string
        code:
          type: string
        symbol:
          type: string
        short_desc:
          type: string
        long_desc:
          type: string
        additional_desc:
          type: object
          properties:
            url:
              type: string
            content_type:
              type: string
              enum:
                - text/plain
                - text/html
                - application/json
          additionalProperties: false
        images:
          type: array
          items:
            $ref: "#/components/schemas/ImageIgm"
        media:
          type: array
          items:
            $ref: "#/components/schemas/MediaFile"
        audio:
          type: string
          format: uri
        3d_render:
          type: string
          format: uri
        tags:
          description: A list of tags containing any additional information sent along with the Acknowledgement.
          type: array
          items:
            $ref: "#/components/schemas/TagGroup"
      additionalProperties: false
    Dimensions:
      description: Describes the dimensions of a real-world object
      type: object
      properties:
        length:
          $ref: "#/components/schemas/Scalar"
        breadth:
          $ref: "#/components/schemas/Scalar"
        height:
          $ref: "#/components/schemas/Scalar"
      additionalProperties: false
    Document:
      description: Describes a document which can be sent as a url
      type: object
      properties:
        url:
          type: string
          format: uri
        label:
          type: string
      additionalProperties: false
    Domain:
      description: Codification of domain for ONDC
      type: string
      enum:
        - nic2004:60232
        - ONDC:LOG10
        - ONDC:LOG11
    Duration:
      description: Describes duration as per ISO8601 format
      type: string
    Error:
      description: Describes an error object
      type: object
      properties:
        type:
          type: string
          enum:
            - CONTEXT-ERROR
            - CORE-ERROR
            - DOMAIN-ERROR
            - POLICY-ERROR
            - JSON-SCHEMA-ERROR
        code:
          type: string
          description: ONDC specific error code. For full list of error codes, refer to docs/drafts/Error Codes.md of this repo
        path:
          type: string
          description: Path to json schema generating the error. Used only during json schema validation errors
        message:
          type: string
          description: Human readable message describing the error
      required:
        - type
        - code
      additionalProperties: false
    Faq:
      type: object
      description: |
        faqs
      properties:
        question:
          type: string
        answer:
          type: string
      additionalProperties: false
    Feedback:
      description: Feedback for a service
      type: object
      properties:
        feedback_form:
          $ref: "#/components/schemas/FeedbackForm"
        feedback_url:
          $ref: "#/components/schemas/FeedbackUrl"
      additionalProperties: false
    FeedbackForm:
      description: Describes a feedback form that a Seller App can send to get feedback from the Buyer App
      type: array
      items:
        $ref: "#/components/schemas/FeedbackFormElement"
    FeedbackFormElement:
      description: An element in the feedback form. It can be question or an answer to the question.
      type: object
      properties:
        id:
          type: string
        parent_id:
          $ref: "#/components/schemas/FeedbackFormElement/properties/id"
        question:
          description: Specifies the question to which the answer options will be contained in the child FeedbackFormElements
          type: string
        answer:
          description: Specifies an answer option to which the question will be in the FeedbackFormElement specified in parent_id
          type: string
        answer_type:
          description: Specifies how the answer option should be rendered.
          type: string
          enum:
            - radio
            - checkbox
            - text
      additionalProperties: false
    FeedbackUrl:
      description: Describes how a feedback URL will be sent by the Seller App
      type: object
      properties:
        url:
          description: feedback URL sent by the Seller App
          type: string
          format: uri
        tl_method:
          type: string
          enum:
            - http/get
            - http/post
        params:
          type: object
          properties:
            feedback_id:
              type: string
              description: This value will be placed in the the $feedback_id url param in case of http/get and in the requestBody http/post requests
          additionalProperties:
            type: string
          required:
            - feedback_id
      additionalProperties: false
    Fee:
      description: A fee applied on a particular entity
      type: object
      properties:
        percentage:
          description: Percentage of a value
          allOf:
            - $ref: "#/components/schemas/DecimalValue"
        amount:
          description: A fixed value
          allOf:
            - $ref: "#/components/schemas/Price"
      additionalProperties: false
    Form:
      description: Describes a form
      type: object
      properties:
        url:
          description: The URL from where the form can be fetched. The content fetched from the url must be processed as per the mime_type specified in this object. Once fetched, the rendering platform can choosed to render the form as-is as an embeddable element; or process it further to blend with the theme of the application. In case the interface is non-visual, the the render can process the form data and reproduce it as per the standard specified in the form.
          type: string
          format: uri
        data:
          description: The form content string. This content will again follow the mime_type field for processing. Typically forms should be sent as an html string starting with <form></form> tags. The application must render this form after removing any css or javascript code if necessary. The `action` attribute in the form should have a url where the form needs to be submitted.
          type: string
        mime_type:
          description: This field indicates the nature and format of the form received by querying the url. MIME types are defined and standardized in IETF's RFC 6838.
          type: string
      additionalProperties: false
    Fulfillment:
      description: Describes how a single product/service will be rendered/fulfilled to the end customer
      type: object
      properties:
        id:
          type: string
          description: Unique reference ID to the fulfillment of an order
        type:
          type: string
          description: This describes the type of fulfillment
        "@ondc/org/awb_no":
          type: string
        "@ondc/org/ewaybillno":
          type: string
        "@ondc/org/ebnexpirydate":
          type: string
          format: date-time
        provider_id:
          $ref: "#/components/schemas/Provider/properties/id"
        rating:
          $ref: "#/components/schemas/Rating/properties/value"
        state:
          anyOf:
            - $ref: "#/components/schemas/State"
            - type: string
              description: Fulfillment state of an order
        tracking:
          type: boolean
          description: Indicates whether the fulfillment allows tracking
          default: false
        customer:
          type: object
          properties:
            person:
              $ref: "#/components/schemas/Person"
            contact:
              $ref: "#/components/schemas/Contact"
          additionalProperties: false
        agent:
          $ref: "#/components/schemas/Agent"
        person:
          $ref: "#/components/schemas/Person"
        contact:
          $ref: "#/components/schemas/Contact"
        vehicle:
          $ref: "#/components/schemas/Vehicle"
        start:
          description: Details on the start of fulfillment
          type: object
          properties:
            location:
              $ref: "#/components/schemas/Location"
            time:
              $ref: "#/components/schemas/Time"
            instructions:
              $ref: "#/components/schemas/Descriptor"
            contact:
              $ref: "#/components/schemas/Contact"
            person:
              $ref: "#/components/schemas/Person"
            authorization:
              $ref: "#/components/schemas/Authorization"
          additionalProperties: false
        end:
          description: Details on the end of fulfillment
          type: object
          properties:
            location:
              $ref: "#/components/schemas/Location"
            time:
              $ref: "#/components/schemas/Time"
            instructions:
              $ref: "#/components/schemas/Descriptor"
            contact:
              $ref: "#/components/schemas/Contact"
            person:
              $ref: "#/components/schemas/Person"
            authorization:
              $ref: "#/components/schemas/Authorization"
          additionalProperties: false
        rateable:
          $ref: "#/components/schemas/Rateable"
        tags:
          type: array
          items:
            $ref: "#/components/schemas/TagGroup"
      additionalProperties: false
    Gps:
      description: Describes a gps coordinate
      type: string
      pattern: ^[-+]?([1-8]?\d(\.\d+)?|90(\.0+)?),\s*[-+]?(180(\.0+)?|((1[0-7]\d)|([1-9]?\d))(\.\d+)?)$
    GRO:
      description: |
        Grievance Redressal Officer is appointed by each network participant (buyer app, seller app, logistic provider app) for consumer grievance redressal
        Details of the GRO appointed by the resolution provider to support in issue resolution .
        This is a required object if and when the issue type is "Grievance"
      type: object
      properties:
        person:
          $ref: "#/components/schemas/Person"
        contact:
          $ref: "#/components/schemas/Contact"
          required:
            - phone
            - email
        gro_type:
          type: string
          description: |
            Indicates the system through which the GRO is assigned to this issue. 
            ### TYPES
                1. Intefacing NP GRO : indicating the GRO is assigned by the NP where or through which the issue is raised
                2. Transaction Counterparty NP GRO : indicating the GRO is assigned by the first level of counterparty network provider with which the interfacing NP is interacting with to get an issue resolution.
                3. Cascaded Counterparty NP GRO : indicating the GRO is assigned by the second or any further downstream levels of counterparty network provider, with which the NP is interacting with, to get an issue resolution.
          enum:
            - INTEFACING-NP-GRO
            - TRANSACTION-COUNTERPARTY-NP-GRO
            - CASCADED-COUNTERPARTY-NP-GRO
      required:
        - contact
        - gro_type
      additionalProperties: false
    Image:
      description: "Image of an object. <br/><br/> A url based image will look like <br/><br/>```uri:http://path/to/image``` <br/><br/> An image can also be sent as a data string. For example : <br/><br/> ```data:js87y34ilhriuho84r3i4```"
      type: string
      additionalProperties: false
    ImageIgm:
      description: "Image of an object. <br/><br/> A url based image will look like <br/><br/>```uri:http://path/to/image``` <br/><br/> An image can also be sent as a data string. For example : <br/><br/> ```data:js87y34ilhriuho84r3i4```"
      type: object
      properties:
        url:
          type: string
          format: uri
        size_type:
          type: string
      additionalProperties: false
    Intent:
      description: Intent of a user. Used for searching for services
      type: object
      properties:
        descriptor:
          $ref: "#/components/schemas/Descriptor"
        provider:
          $ref: "#/components/schemas/Provider"
        fulfillment:
          $ref: "#/components/schemas/Fulfillment"
        payment:
          $ref: "#/components/schemas/Payment"
        category:
          $ref: "#/components/schemas/Category"
        offer:
          $ref: "#/components/schemas/Offer"
        item:
          $ref: "#/components/schemas/Item"
        "@ondc/org/payload_details":
          type: object
          description: payload details that will allow logistics provider to determine serviceability. For weight, enums for unit are - "kilogram", "gram" For dimensions, enums for length.unit, breadth.unit and height.unit are - "meter", "centimeter"
          properties:
            weight:
              $ref: "#/components/schemas/Scalar"
            dimensions:
              $ref: "#/components/schemas/Dimensions"
            category:
              type: string
            value:
              $ref: "#/components/schemas/Price"
            dangerous_goods:
              type: boolean
          additionalProperties: false
        tags:
          type: array
          items:
            $ref: "#/components/schemas/TagGroup"
      additionalProperties: false
    ItemQuantity:
      description: Describes count or amount of an item
      type: object
      properties:
        allocated:
          type: object
          properties:
            count:
              type: integer
              minimum: 0
            measure:
              $ref: "#/components/schemas/Scalar"
          additionalProperties: false
        available:
          type: object
          properties:
            count:
              type: integer
              minimum: 0
            measure:
              $ref: "#/components/schemas/Scalar"
          additionalProperties: false
        maximum:
          type: object
          properties:
            count:
              type: integer
              minimum: 1
