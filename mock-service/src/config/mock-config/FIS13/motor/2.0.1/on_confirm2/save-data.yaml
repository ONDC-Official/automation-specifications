save-data:
    transaction_id: "$.context.transaction_id"
    message_id: "$.context.message_id"
    order: "$.message.order"
    created_at : "$.message.order.created_at"
    order_id: "$.message.order.id"
    child_item_id: "$.message.order.items[0].id"
    parent_item_id: "$.message.order.items[0].parent_item_id"
    fulfillment_id: "$.message.order.fulfillments[0].id"
    second_fulfillment_id: "$.message.order.fulfillments[1].id"
    provider_id: "$.message.order.provider.id"
    quote_id: "$.message.order.quote.id"
    claim_form_motor: "$.message.order.documents[?(@.descriptor.code=='CLAIM_DOC')].url"
    renew_form: "$.message.order.documents[?(@.descriptor.code=='RENEW_DOC')].url"