save-data:
  transaction_id: "$.context.transaction_id"
  message_id: "$.context.message_id"
  selected_items: "$.message.order.items[*]"
  item: "$.message.order.items[1]"
  selected_fulfillments: "$.message.order.fulfillments[*]"
  selected_provider: "$.message.order.provider"
  selected_items_id: "$.message.order.items[*].id"
  # billing: "$.message.order.billing"
  tags: "$.message.order.tags[*]"
  # ── Persist settlement_amount so on_init/on_confirm reuse EXACT same value ──
  # injectSettlementAmount writes this into the payment tag; we read it back here
  settlement_amount: "$.message.order.payments[0].tags[0].list[?(@.descriptor.code=='SETTLEMENT_AMOUNT')].value"