save-data:
  transaction_id: "$.context.transaction_id"
  message_id: "$.context.message_id"
  verification_status: "$..form.url"
  Ekyc_details_form: "$..form.url"
  items: "$.message.order.items[*]"
  provider_id: "$.message.order.provider.id"
  item: "$.message.order.items[0]"
  selected_provider: "$.message.order.provider"
  quote_id: "$.message.order.quote.id"
  quote: "$.message.order.quote"
  form_id: "$.message.order.items[0].xinput.form.id"
  # Loan data for dynamic SETTLEMENT_AMOUNT calculation
  quote_price: "$.message.order.quote.price.value"
  principal_amount: "$.message.order.quote.breakup[?(@.title=='PRINCIPAL')].price.value"
  loan_term: "$.message.order.items[0].tags[?(@.descriptor.code=='LOAN_INFO')].list[?(@.descriptor.code=='TERM')].value"