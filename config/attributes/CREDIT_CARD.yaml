meta:
  use_case_id: CREDIT CARD
attribute_set:
  search:
    context:
      location:
        country:
          code:
            _description:
              required: true
              usage: IND
              info: >-
                It Explains the country code in accordance with the ISO 3166-1
                and ISO 3166-2 formats.
                 
                 The ISO 3166-1 standard includes 249 countries, with 193 sovereign states as UN members. Dependent territories in ISO 3166-1 are often detailed as subdivisions in ISO 3166-2 under their administering state.
              owner: BAP
              type: enum
              enums: &a1
                - code: IND
                  description: Represents the country
                  reference: <PR/Issue/Discussion Links md format text>
          _description:
            required: false
            usage: --
            info: This attribute defines the country of location where the transaction is
              meant to be completed.
            owner: BAP
            type: object
        city:
          code:
            _description:
              required: true
              usage: "*"
              info: This attribute describes the city code relevant to the location or the
                area in which it is situated.
              owner: BAP
              type: enum
              enums: &a2
                - code: std:080
                  description: Represent the city code that identifies the cities. In case of '*'
                    it will fetch all the cities where service is being
                    provided.
                  reference: <PR/Issue/Discussion Links md format text>
          _description:
            required: false
            usage: --
            info: This attribute defines the city of location where the transaction is meant
              to be completed.
            owner: BAP
            type: object
        _description:
          required: false
          usage: --
          info: This attribute defines the location where the transaction is meant to be
            completed.
          owner: BAP
          type: object
      domain:
        _description:
          required: true
          usage: ONDC:FIS15
          info: This is the domain code relevant to the context of this transaction. Here,
            it is "ONDC:FIS15".
          owner: BAP
          type: enum
          enums: &a3
            - code: ONDC:FIS12
              description: Updated domain namespace
              reference: <PR/Issue/Discussion Links md format text>
      timestamp:
        _description:
          required: true
          usage: 2023-03-23T04:41:16.000Z
          info: >-
            It specifies the time of request generation in RFC3339 format.
            RFC3339 is a date and time format defined by the Internet
            Engineering Task Force (IETF) in the RFC 3339 standard.
             YYYY: Four-digit year
             MM: Two-digit month (01-12)
             DD: Two-digit day of the month (01-31)
             T: Separator between the date and time
             HH: Two-digit hour (00-23)
             MM: Two-digit minute (00-59)
             SS: Two-digit second (00-59)
             .sss: Fractional seconds (optional)
             Z: Indicates the time is in UTC (optional; the time may also include an offset)
          owner: BAP
          type: string
      bap_id:
        _description:
          required: true
          usage: bap.credit.becknprotocol.io
          info: This the subscriber ID of the BAP. It is the unique id for the buyer app.
          owner: BAP
          type: string
      transaction_id:
        _description:
          required: true
          usage: false
          info: >-
            It describes a unique identifier that remains consistent across all
            API calls from search to confirm. 
             It shows an active user session across multiple requests. BPPs can use it to send personalized recommendations and dynamic offers, even if they don't know the user active on the BAP.
          owner: BAP
          type: string
      message_id:
        _description:
          required: true
          usage: 13ba8018f176
          info: >-
            This is a mandatory and unique identifier that persists consistently
            throughout a request/callback cycle.
             This value can be utilized to filter out and ignore duplicate messages coming from the BPP.
          owner: BAP
          type: string
      version:
        _description:
          required: true
          usage: 2.0.3
          info: It explains the transaction protocol version utilized by the sender.
          owner: BAP
          type: integer
      action:
        _description:
          required: true
          usage: search
          info: >-
            The sender initiates the Beckn protocol method, which is then
            carried out by the receiver.
             Beckn is an open, interoperable and universal transaction protocol to enable a decentralised digital economy.
          owner: BAP
          type: string
      bap_uri:
        _description:
          required: true
          usage: https://bap.credit.becknprotocol.io/
          info: This is the subscriber URL of the Buyer App (BAP) is the endpoint that
            accepts callbacks from Seller App (BPPs).
          owner: BAP
          type: string
      ttl:
        _description:
          required: true
          usage: PT30S
          info: >-
            Specifies the validity duration of this message in ISO8601 format,
            after timestamp.
             In the case of "PT30S," it represents a duration of 30 seconds. Here's a breakdown of the components:
             
             - "P" indicates the period.
             - "T" indicates the time part.
             - "30S" represents 30 seconds.
             
             So, "PT30S" signifies a duration of 30 seconds.
          owner: BAP
          type: string
      _description:
        required: false
        usage: --
        info: " This attribute defines the context of the transaction."
        owner: BAP
        type: object
    message:
      intent:
        category:
          descriptor:
            code:
              _description:
                required: false
                usage: CREDIT_CARD
                info: This attribute refers to categorizing loans based on whether they are
                  intended for personal use or are meant for invoices.
                owner: BAP
                type: enum
                enums: &a4
                  - code: PERSONAL_LOAN
                    description: Describes an unsecured credit provided by financial institutions
