            _description:
              required: false
              usage: --
              info: This attribute refers to the category descriptor code
              owner: BAP
              type: object
          _description:
            required: false
            usage: --
            info: This attribute refers to details on the item category.
            owner: BAP
            type: object
        _description:
          required: false
          usage: --
          info: This attribute refers to intent to buy or avail a product or a service.
            The BAP can declare the intent of the consumer containing
          owner: BAP
          type: object
      _description:
        required: false
        usage: --
        info: This attribute refers to the message of the transaction
        owner: BAP
        type: object
    _description:
      required: false
      usage: --
      info: <placeholder description>
      owner: BAP
      type: object
