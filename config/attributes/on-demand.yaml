              type: object
          _description:
            required: true
            usage: --
            info: Describes how a an order will be rendered/fulfilled to the end-customer
            owner: BAP
            type: object
        payment:
          collected_by:
            _description:
              required: true
              usage: BPP
              info: This field indicates the payment collector. If set to 'bap,' BAP collects
                first and settles with BPP. If BPP agrees, no payment link is
                sent. If set to 'bpp,' BPP collects payment directly.
              owner: BAP
              type: enum
              enums: &a7
                - code: BPP
                  description: Describes when the seller app is collecting the payment.
                  reference: <PR/Issue/Discussion Links md format text
                - code: BAP
                  description: Describes when the buyer app is collecting the payment.
                  reference: <PR/Issue/Discussion Links md format text
          _description:
            required: true
            usage: --
            info: The terms of settlement for this order
            owner: BAP
            type: object
          tags:
