              _description:
                required: true
                usage: --
                info: Describes Buyer finder fee
                owner: BAP
                type: object
            SETTLEMENT_TERMS:
              _description:
                required: true
                usage: --
                info: Describes settlement terms
                owner: BAP
                type: object
            _description:
              required: false
              usage: --
              info: <placeholder description>
              owner: BAP
              type: object
        _description:
          required: true
