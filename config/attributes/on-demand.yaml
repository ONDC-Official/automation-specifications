              _description:
                required: false
                usage: EV
                info: Describes fuel type of the vehicle.
                owner: BAP
                type: string
            _description:
              required: false
              usage: --
              info: Describes a vehicle is a device that is designed or used to transport
                people or cargo over land, water, air, or through space.<br>This
                has properties like category, capacity, make, model,
                size,variant,color,energy_type,registration
