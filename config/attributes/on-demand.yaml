          usage: https://api.example-bap.com/pilot/bap/cab/v1
          info: Describes subscriber URL of the BAP for accepting callbacks from BPPs.
          owner: BAP
          type: string
      ttl:
        _description:
          required: true
          usage: PT30S
          info: Describes the duration in ISO8601 format after timestamp for which this
            message holds valid
          owner: BAP
          type: string
      _description:
        required: false
        usage: --
        info: " This attribute defines the context of the transaction."
        owner: BAP
        type: object
    message:
      intent:
        fulfillment:
          customer:
            person:
              gender:
                _description:
                  required: false
                  usage: CAB
                  info: Describes the customer gender.
