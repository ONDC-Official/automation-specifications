              info: The list of logical stops encountered during the fulfillment of an order.
              owner: BAP
              type: object
          vehicle:
            category:
              _description:
                required: false
                usage: CAB
                info: Describes the vehicle category.
                owner: BAP
                type: enum
                enums: &a5
                  - code: AUTO_RICKSHAW
                    description: Describes the vehicle category as Auto Rickshaw
                    reference: <PR/Issue/Discussion Links md format text
                  - code: CAB
                    description: Describes the vehicle category as cab
                    reference: <PR/Issue/Discussion Links md format text
                  - code: TWO_WHEELER
                    description: Describes the vehicle category as TWO_WHEELER
                    reference: <PR/Issue/Discussion Links md format text
            variant:
              _description:
                required: false
                usage: SEDAN
                info: Describes the vehicle variant.
                owner: BAP
                type: enum
                enums: &a6
                  - code: SEDAN
                    description: Describes the vehicle variant for category type CAB
                    reference: <PR/Issue/Discussion Links md format text
                  - code: SUV
                    description: Describes the vehicle variant for category type CAB
                    reference: <PR/Issue/Discussion Links md format text
                  - code: HATCHBACK
                    description: Describes the vehicle variant for category type CAB
                    reference: <PR/Issue/Discussion Links md format text
                  - code: TWO_WHEELER
                    description: Describes the vehicle variant for category TWO_WHEELER
                    reference: <PR/Issue/Discussion Links md format text
                  - code: AUTO_RICKSHAW
                    description: Describes the vehicle variant for category AUTO_RICKSHAW
                    reference: <PR/Issue/Discussion Links md format text
