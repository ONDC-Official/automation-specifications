meta:
  use_case_id: MUTUAL FUNDS
attribute_set:
  search:
    context:
      location:
        country:
          code:
            _description:
              required: true
              usage: IND
              info: Country code in ISO 3166-1 and ISO 3166-2 format. Since we are dealing
                with MF in India, use `IND`
              owner: BAP
              type: enum
              enums: &a1
                - code: IND
                  description: India
                  reference: <PR/Issue/Discussion Links md format text>
          _description:
            required: true
            usage: --
            info: This attribute defines the country of location where the transaction is
              meant to be completed.
            owner: BAP
            type: object
        city:
          code:
            _description:
              required: true
              usage: "*"
              info: City code. As MF is a digital product, it is location agnostic, use `*`
              owner: BAP
              type: enum
              enums: &a2
                - code: "*"
                  description: Any city (wildcard)
                  reference: <PR/Issue/Discussion Links md format text>
          _description:
            required: true
            usage: --
            info: This attribute defines the city of location where the transaction is meant
              to be completed.
            owner: BAP
            type: object
        _description:
          required: true
          usage: --
          info: This attribute defines the location where the transaction is meant to be
            completed.
          owner: BAP
          type: object
      domain:
        _description:
          required: true
          usage: ONDC:FIS14
          info: Domain as defined by ONDC. For MF use `ONDC:FIS14`
          owner: BAP
          type: enum
          enums: &a3
            - code: ONDC:FIS14
              description: Financial Investment Services domain
              reference: <PR/Issue/Discussion Links md format text>
      timestamp:
        _description:
          required: true
          usage: 2023-03-23T04:41:16Z
          info: Time of request generation in RFC3339 format
          owner: BAP
          type: string
      bap_id:
        _description:
          required: true
          usage: api.buyerapp.com
          info: Subscriber ID of the buyer NP
          owner: BAP
          type: string
      transaction_id:
        _description:
          required: true
          usage: 23452234324sdf
          info: Co-relation ID for the entire transaction journey
          owner: BAP
          type: string
      message_id:
        _description:
          required: true
          usage: 32r435345fddsaf
          info: Co-relation ID for request / callback messages
          owner: BAP
          type: string
      version:
        _description:
          required: true
          usage: 2.0.0
          info: Protocol version used by the sender
          owner: BAP
          type: string
      action:
        _description:
          required: true
          usage: search
          info: Protocol method being called by the sender
          owner: BAP
          type: enum
          enums: &a4
            - code: search
              description: Buyer app specifies search intent
              reference: <PR/Issue/Discussion Links md format text>
            - code: on_search
              description: Seller app responds with catalog
              reference: <PR/Issue/Discussion Links md format text>
            - code: select
              description: Buyer app specifies selected items
              reference: <PR/Issue/Discussion Links md format text>
            - code: on_select
              description: Seller app responds with serviceability and quote
              reference: <PR/Issue/Discussion Links md format text>
            - code: init
              description: Buyer and seller agree to terms
              reference: <PR/Issue/Discussion Links md format text>
            - code: on_init
              description: Response to init with agreed terms
              reference: <PR/Issue/Discussion Links md format text>
            - code: confirm
              description: Buyer app places order
              reference: <PR/Issue/Discussion Links md format text>
            - code: on_confirm
              description: Seller app responds to order
              reference: <PR/Issue/Discussion Links md format text>
            - code: update
              description: Buyer app requests order updates
              reference: <PR/Issue/Discussion Links md format text>
            - code: on_update
              description: Seller app responds with updates
              reference: <PR/Issue/Discussion Links md format text>
            - code: status
              description: Request for order status
              reference: <PR/Issue/Discussion Links md format text>
            - code: on_status
              description: Response with order status
              reference: <PR/Issue/Discussion Links md format text>
      bap_uri:
        _description:
          required: true
          usage: https://api.buyerapp.com/ondc
          info: Subscriber URL for the buyer NP for accepting callbacks from seller NPs
          owner: BAP
          type: string
      ttl:
        _description:
          required: true
          usage: PT30S
          info: Duration for which this message holds valid. Typically, the sender will
            wait for the callback response for this duration
          owner: BAP
          type: string
      _description:
        required: false
        usage: --
        info: " This attribute defines the context of the transaction."
        owner: BAP
        type: object
