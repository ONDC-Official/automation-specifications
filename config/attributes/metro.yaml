            required: true
            usage: --
            info: This attribute defines the city of location where the transaction is meant
              to be completed.
            owner: BAP
            type: object
        _description:
          required: true
          usage: --
          info: This attribute defines the location where the transaction is meant to be
            completed.
          owner: BAP
          type: object
      domain:
        _description:
          required: true
          usage: ONDC:TRV11
          info: Describes domain code that is relevant to this transaction context
          owner: BAP
          type: enum
          enums: &a3
            - code: ONDC:TRV11
              description: mobility domain Public Transit
              reference: <PR/Issue/Discussion Links md format text>
      timestamp:
        _description:
          required: true
          usage: 2023-03-23T04:41:16Z
          info: Describes tme of request generation in RFC3339 format
          owner: BAP
          type: string
      bap_id:
        _description:
          required: true
          usage: api.example-bap.com
          info: Describes subscriber ID of the BAP
          owner: BAP
          type: string
      transaction_id:
        _description:
          required: true
          usage: 6743e9e2
          info: Describes  a unique value which persists across all API calls
          owner: BAP
          type: string
      message_id:
        _description:
          required: true
          usage: 13ba8018f176
          info: Describes a unique value which persists during a request / callback cycle.
