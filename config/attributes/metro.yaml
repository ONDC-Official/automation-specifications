              required: true
              usage: --
              info: Describes a vehicle is a device that is designed or used to transport
                people or cargo over land, water, air, or through space.<br>This
                has properties like category, capacity, make, model,
                size,variant,color,energy_type,registration
              owner: BAP
              type: object
          _description:
            required: true
            usage: --
            info: Describes how a an order will be rendered/fulfilled to the end-customer
            owner: BAP/BPP
            type: object
        payment:
          collected_by:
            _description:
              required: false
              usage: BPP
              info: This field indicates the payment collector. If set to 'bap,' BAP collects
                first and settles with BPP. If BPP agrees, no payment link is
                sent. If set to 'bpp,' BPP collects payment directly.
              owner: BAP
              type: string
          _description:
            required: false
            usage: --
            info: The terms of settlement for this order
            owner: BAP
            type: object
        _description:
          required: true
          usage: --
          info: This helps the system to find out the purpose of the user behind choosing
            any product or service. By using this intent the system can align
            relevant options from available products or service.
          owner: BAP
          type: object
      _description:
        required: false
        usage: --
        info: This attribute refers to the message of the transaction
        owner: BAP
        type: object
    _description:
      required: false
      usage: --
      info: <placeholder description>
      owner: BAP
      type: object
