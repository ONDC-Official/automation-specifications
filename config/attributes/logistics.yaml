                owner: BAP
                type: object
            _description:
              required: false
              usage: --
              info: <placeholder description>
              owner: BAP
              type: object
          _description:
            required: false
            usage: --
            info: <placeholder description>
            owner: BAP
            type: object
        payment:
          type:
