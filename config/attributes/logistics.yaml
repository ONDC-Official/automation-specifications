meta:
  use_case_id: logistics
attribute_set:
  search:
    context:
      domain:
        _description:
          required: true
          usage: ONDC:LOG10
          info: Describes domain code that is relevant to this transaction context
          owner: BAP
          type: enum
          enums: &a1
            - code: ONDC:LOG10
              description: Hyperlocal logistics domain code (P2P)
              reference: <PR/Issue/Discussion Links md format text>
            - code: ONDC:LOG11
              description: Intercity logistics domain code (P2H2P)
              reference: <PR/Issue/Discussion Links md format text>
            - code: nic2004:60232
              description: Logistics domain code (deprecated)
              reference: <PR/Issue/Discussion Links md format text>
      country:
        _description:
          required: true
          usage: IND
          info: Describes country code as per ISO 3166-1 and ISO 3166-2 format
          owner: BAP
          type: string
      city:
        _description:
          required: true
          usage: std:080
          info: >
            Describes the city code this location is, or is located within, city
            code should match the city for fulfillment start location;
          owner: BAP
          type: string
      action:
        _description:
          required: true
          usage: search
          info: Describes the Beckn protocol method being called by the sender and
            executed at the receiver.
          owner: BAP
          type: string
      core_version:
        _description:
          required: true
          usage: 1.2.5
          info: Describes the version of transaction protocol being used by the sender.
          owner: BAP
          type: string
      bap_id:
        _description:
          required: true
          usage: api.example-bap.com
          info: Describes subscriber ID of the BAP
          owner: BAP
          type: string
      bap_uri:
        _description:
          required: true
          usage: https://api.example-bap.com/pilot/bap/cab/v1
          info: Describes subscriber URL of the BAP for accepting callbacks from BPPs.
          owner: BAP
          type: string
      transaction_id:
        _description:
          required: true
          usage: 6743e9e2
          info: Describes  a unique value which persists across all API calls
          owner: BAP
          type: string
      message_id:
        _description:
          required: true
          usage: 13ba8018f176
          info: Describes a unique value which persists during a request / callback cycle.
          owner: BAP
          type: string
      timestamp:
        _description:
          required: true
          usage: 2023-03-23T04:41:16Z
          info: Describes tme of request generation in RFC3339 format
          owner: BAP
          type: string
      ttl:
        _description:
          required: true
          usage: PT30S
          info: Describes the duration in ISO8601 format after timestamp for which this
            message holds valid
          owner: BAP
          type: string
      _description:
        required: false
        usage: --
        info: " This attribute defines the context of the transaction."
        owner: BAP
        type: object
    message:
      intent:
        category:
          id:
            _description:
              required: true
              usage: Immediate Delivery
              info: >
                Express Delivery" - by air (for P2H2P); "Standard Delivery" - by
                surface (for P2P, P2H2P): "Immediate Delivery" is for S2D <= 60
                min; "Same Day Delivery" "Next Day Delivery" If id="Standard
                Delivery": all possible options should be returned in /on_search
                (including for "Immediate Delivery", "Same Day Delivery", "Next
                Day Delivery"); If id="Express Delivery": all possible P2H2P
                options should be returned in /on_search;
              owner: BAP
              type: enum
              enums: &a2
                - code: Express Delivery
                  description: Delivery will be done by Air
                  reference: <PR/Issue/Discussion Links md format text>
                - code: Standard Delivery
                  description: Delivery will be done by Surface
                  reference: <PR/Issue/Discussion Links md format text>
                - code: Immediate Delivery
                  description: Delivery will be done within S2D (Shipment to Delivery) <= 60 min
                  reference: <PR/Issue/Discussion Links md format text>
                - code: Next Day Delivery
                  description: Delivery will be done on the Next Day with respect to context
                    timestamp
                  reference: <PR/Issue/Discussion Links md format text>
                - code: Same Day Delivery
                  description: Delivery will be done on the Same Day with respect to context
                    timestamp
                  reference: <PR/Issue/Discussion Links md format text>
                - code: Instant Delivery
                  description: Delivery will be done withing 10 minutes (S2D TAT <= 10 min)
                  reference: <PR/Issue/Discussion Links md format text>
          _description:
            required: false
            usage: --
            info: This attribute refers to details on the item category.
            owner: BAP
            type: object
        item:
          descriptor:
            code:
              _description:
                required: false
                usage: false
                info: Describes the type of order, point to point (P2P) or via hub (P2H2P),
                  deprecated, not to be used.
                owner: BAP
                type: string
            _description:
              required: false
              usage: --
              info: <placeholder description>
              owner: BAP
              type: object
          _description:
            required: false
            usage: --
            info: <placeholder description>
            owner: BAP
            type: object
        provider:
          time:
            days:
              _description:
                required: true
                usage: 1,2,3,4,5,6,7
                info: >
                  store pickup timings; days of week: 1 - Monday till 7 - Sunday;
                owner: BAP
                type: string
            schedule:
              holidays:
                _description:
                  required: true
                  usage: |-
                    [ "2023-06-29",
                                  "2023-08-15"
                    ]
                  info: list of future dated holidays;
                  owner: BAP
                  type: array
              _description:
                required: false
                usage: --
                info: <placeholder description>
                owner: BAP
                type: object
            duration:
              _description:
                required: true
                usage: PT30M
                info: order preparation time (indicates estimate timing for logistics
                  ready_to_ship) - may be used by LSP to optimize scheduling of
                  task allocation;
                owner: BAP
                type: string
            range:
              start:
                _description:
                  required: true
                  usage: 1100
                  info: define store order pickup timing, for "days" above, here it means the
                    store order pickup timings are from 1100 to 2100 from Monday
                    to Sunday;
                  owner: BAP
                  type: string
              end:
                _description:
                  required: true
                  usage: 2100
                  info: end time must be greater than start time and (end time - start time) must
                    be less than 24 hrs;
                  owner: BAP
                  type: string
              _description:
                required: false
                usage: --
                info: <placeholder description>
                owner: BAP
                type: object
            _description:
              required: false
              usage: --
              info: <placeholder description>
              owner: BAP
              type: object
          _description:
            required: false
            usage: --
            info: Describe the provider from which the customer wants to place to the order
              from
            owner: BAP
            type: object
        fulfillment:
          type:
            _description:
              required: true
              usage: Delivery
              info: Type of fulfillment (Delivery or Return).
              owner: BAP
              type: enum
              enums: &a3
                - code: Delivery
                  description: Describes the type of fulfillment.
                  reference: <PR/Issue/Discussion Links md format text
                - code: Return
                  description: Describes the type of fulfillment.
                  reference: <PR/Issue/Discussion Links md format text
                - code: RTO
                  description: Describes the type of fulfillment.
                  reference: <PR/Issue/Discussion Links md format text
          start:
            location:
              id:
                _description:
                  required: false
                  usage: S1
                  info: unique id for store - optional;
                  owner: BAP
                  type: string
              gps:
                _description:
                  required: true
                  usage: 12.4535,77.9283
                  info: >
                    GPS coordinates for pickup location, minimum 4 digit decimal
                    precision;
                  owner: BAP
                  type: string
              address:
                area_code:
                  _description:
                    required: true
                    usage: 560041
                    info: Area code for pickup location address.
                    owner: BAP
                    type: string
                _description:
                  required: false
                  usage: --
                  info: <placeholder description>
                  owner: BAP
                  type: object
              _description:
                required: false
                usage: --
                info: <placeholder description>
                owner: BAP
                type: object
            authorization:
              type:
                _description:
                  required: false
                  usage: OTP
                  info: >
                    Authorization type for pickup. optional, only required if
                    LBNP wants pickup authorization, using dynamic OTP; if LSP
                    doesn’t support authorization, they should not respond to
                    the search request;
                  owner: BAP
                  type: enum
                  enums: &a9
                    - code: OTP
                      description: Describes OTP as an authorization mechanism used to start the
                        fulfillment of an order.
                      reference: <PR/Issue/Discussion Links md format text
              _description:
                required: false
                usage: --
                info: <placeholder description>
                owner: BAP
                type: object
            instructions:
              code:
                _description:
                  required: false
                  usage: 5
                  info: static OTP for pickup, other values in the contract remain as is;
                  owner: BAP
                  type: enum
                  enums: &a7
                    - code: "2"
                      description: Describes merchant order number.
                      reference: <PR/Issue/Discussion Links md format text
                    - code: "3"
                      description: Describes any other pickup confirmation code.
                      reference: <PR/Issue/Discussion Links md format text
                    - code: "4"
                      description: Describes OTP for pickup confirmation.
                      reference: <PR/Issue/Discussion Links md format text
                    - code: "5"
                      description: Describes Static OTP for pickup confirmation.
                      reference: <PR/Issue/Discussion Links md format text
              _description:
                required: false
                usage: --
                info: <placeholder description>
                owner: BAP
                type: object
            _description:
              required: false
              usage: --
              info: <placeholder description>
              owner: BAP
              type: object
          end:
            location:
              gps:
                _description:
                  required: true
                  usage: 12.4535,77.9283
                  info: GPS coordinates for delivery location.
                  owner: BAP
                  type: string
              address:
                area_code:
                  _description:
                    required: true
                    usage: 560041
                    info: Area code for delivery location address.
                    owner: BAP
                    type: string
                _description:
                  required: false
