      _RETURN_:
        - _NAME_: VALID_PAYMENT_TYPES
          enumPath: $.message.catalog.providers[*].payments[*].type
          enumList:
            - PRE_ORDER
            - ON-FULFILLMENT
            - PART-PAYMENT
          _CONTINUE_: "!(enumPath are present)"
          _RETURN_: enumPath all in enumList
    - _NAME_: PROVIDER_ITEMS
