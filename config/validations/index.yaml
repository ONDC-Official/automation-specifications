              attr: $.message.order.items[*].price.currency
              enumList:
                - INR
              _RETURN_: attr all in enumList
    - &a8
      _NAME_: ON_SELECT_PROVIDER
      usecasepath: $.message.order.provider.id
      _CONTINUE_: "!(usecasepath are present)"
      _RETURN_:
        - _NAME_: ON_SELECT_PROVIDER_ID
          attr: $.message.order.provider.id
          _RETURN_: attr are present
    - _NAME_: ON_SELECT_OFFERS
      _RETURN_:
        - _NAME_: REQUIRED_OFFER_ID
          attr: $.message.order.offers[*].id
          _RETURN_: attr are present
        - _NAME_: REQUIRED_OFFER_ITEM_IDS
          attr: $.message.order.offers[*].item_ids[*]
          _RETURN_: attr are present
        - _NAME_: VALID_ENUM_OFFER_DESCRIPTOR_CODE
          attr: $.message.order.offers[*].descriptor.code
          enumList:
            - DISCOUNT
            - FREEBIE
          _CONTINUE_: "!(attr are present)"
          _RETURN_: attr any in enumList
    - _NAME_: ON_SELECT_QUOTE
      usecasepath: $.message.order.quote.price.value
      _CONTINUE_: "!(usecasepath are present)"
      _RETURN_:
        - _NAME_: REQUIRED_QUOTE_PRICE_VALUE
          attr: $.message.order.quote.price.value
          _RETURN_: attr are present
        - _NAME_: REQUIRED_QUOTE_PRICE_CURRENCY
          attr: $.message.order.quote.price.currency
          _RETURN_: attr are present
        - _NAME_: REQUIRED_QUOTE_BREAKUP_TITLE
          attr: $.message.order.quote.breakup[*].title
          _RETURN_: attr are present
        - _NAME_: REQUIRED_QUOTE_BREAKUP_PRICE_VALUE
          attr: $.message.order.quote.breakup[*].price.value
          _RETURN_: attr are present
        - _NAME_: REQUIRED_QUOTE_BREAKUP_PRICE_CURRENCY
          attr: $.message.order.quote.breakup[*].price.currency
          _RETURN_: attr are present
        - _NAME_: VALID_ENUM_QUOTE_PRICE_CURRENCY
          attr: $.message.order.quote.price.currency
          enumList:
            - INR
          _RETURN_: attr any in enumList
        - _NAME_: VALID_ENUM_BREAKUP_PRICE_CURRENCY
          attr: $.message.order.quote.breakup[*].price.currency
          enumList:
            - INR
          _RETURN_: attr any in enumList
        - _NAME_: VALID_ENUM_BREAKUP_TITLE
          attr: $.message.order.quote.breakup[*].title
          enumList:
            - ITEM
            - CONVENIENCE_FEE
            - OFFER
            - TAX
          _RETURN_: attr any in enumList
  init:
    - _NAME_: INIT_CONTEXT
      action:
        - init
      domain:
        - ONDC:FIS13
      version:
        - 2.0.0
      _RETURN_: *a1
    - *a2
    - *a3
    - _NAME_: INIT_FULFILLMENTS
      _RETURN_:
        - _NAME_: REQUIRED_FULFILLMENT_ID
          attr: $.message.order.fulfillments[*].id
          _RETURN_: attr are present
        - _NAME_: REQUIRED_FULFILLMENT_TYPE
          attr: $.message.order.fulfillments[*].type
          _RETURN_: attr are present
        - _NAME_: REQUIRED_FULFILLMENT_STOPS_CONTACT_PHONE
          attr: $.message.order.fulfillments[*].stops[*].contact.phone
          reg:
            - ^[6-9]\d{9}$
          _RETURN_: attr follow regex reg
        - _NAME_: REQUIRED_FULFILLMENT_STOPS_CONTACT_EMAIL
          attr: $.message.order.fulfillments[*].stops[*].contact.email
          reg:
            - ^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$
          _RETURN_: attr follow regex reg
        - _NAME_: REQUIRED_FULFILLMENT_STOPS_PERSON_NAME
          attr: $.message.order.fulfillments[*].stops[*].person.name
          _RETURN_: attr are present
    - _NAME_: INIT_ITEMS_TIME_LABEL
      _RETURN_:
        - _NAME_: ENUM_ITEM_TIME_LABEL
          attr: $.message.order.items[*].time.label
          enumList:
            - VALIDITY
          _CONTINUE_: "!(attr are present)"
          _RETURN_: attr any in enumList
    - _NAME_: INIT_ITEMS_CUSTOMIZATION_TAGS
      _RETURN_:
        - _NAME_: REQUIRED_CUSTOMIZATION_TAG_GROUP
          validTags:
            - CUSTOMIZATION
          tagPath: $.message.order.items[*].tags[*].descriptor.code
          _RETURN_: tagPath any in validTags
        - _NAME_: REQUIRED_CUSTOMIZATION_SUBTAGS
          _SCOPE_: $.message.order.items[*].tags[?(@.descriptor.code=='CUSTOMIZATION')]
          subTags: $.list[*].descriptor.code
          validValues:
            - RECEIVER_NAME
            - MESSAGE
          _CONTINUE_: "!(subTags are present)"
          _RETURN_: subTags any in validValues
    - _NAME_: INIT_BILLING
      _RETURN_:
        - _NAME_: REQUIRED_BILLING_NAME
          attr: $.message.order.billing.name
          _RETURN_: attr are present
        - _NAME_: REQUIRED_BILLING_ADDRESS
          attr: $.message.order.billing.address
          _RETURN_: attr are present
        - _NAME_: REQUIRED_BILLING_CITY_CODE
          attr: $.message.order.billing.city.code
          _RETURN_: attr are present
        - _NAME_: REQUIRED_BILLING_STATE_CODE
          attr: $.message.order.billing.state.code
          _RETURN_: attr are present
        - _NAME_: REQUIRED_BILLING_EMAIL
          attr: $.message.order.billing.email
          reg:
            - ^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$
          _RETURN_: attr follow regex reg
        - _NAME_: REQUIRED_BILLING_PHONE
          attr: $.message.order.billing.phone
          reg:
            - ^[6-9]\d{9}$
          _RETURN_: attr follow regex reg
    - _NAME_: INIT_OFFERS_DESCRIPTOR_CODE
      _RETURN_:
        - _NAME_: ENUM_OFFERS_DESCRIPTOR_CODE
          attr: $.message.order.offers[*].descriptor.code
          enumList:
            - DISCOUNT
            - FREEBIE
          _CONTINUE_: "!(attr are present)"
          _RETURN_: attr any in enumList
    - _NAME_: INIT_QUOTE_BREAKUP_TITLE
      _RETURN_:
        - _NAME_: ENUM_QUOTE_BREAKUP_TITLE
          attr: $.message.order.quote.breakup[*].title
          enumList:
            - ITEM
            - CONVENIENCE_FEE
            - OFFER
            - TAX
          _CONTINUE_: "!(attr are present)"
          _RETURN_: attr any in enumList
  on_init:
    - _NAME_: ON_INIT_CONTEXT
      action:
