        - _NAME_: VALID_OFFER_DESCRIPTOR_CODE_ENUM
          attr: $.message.order.offers[*].descriptor.code
          enumList:
            - DISCOUNT
            - FREEBIE
          _CONTINUE_: "!(attr are present)"
          _RETURN_: attr all in enumList
