              _RETURN_: attr are present
            - _NAME_: REQUIRED_CONTEXT_BPP_URI
              attr: $.context.bpp_uri
              _RETURN_: attr are present
            - _NAME_: REQUIRED_CONTEXT_TRANSACTION_ID
              attr: $.context.transaction_id
              _RETURN_: attr are present
            - _NAME_: REQUIRED_CONTEXT_MESSAGE_ID
              attr: $.context.message_id
