          - name: reteb2b_select
            type: reteb2b_select
            schema:
              $schema: http://json-schema.org/draft-07/schema#
              type: object
              additionalProperties: false
              properties:
                type:
                  type: string
                  description: Retailer registration type
                  enum:
                    - new
                    - existing
                  default: existing
                customer_id:
                  type: string
                  title: Customer ID
                  default: CUST-2024-0015421
                city_code:
                  type: string
                  title: City Code
                  default: std:060
                live_catalog:
                  type: object
                  title: Live Catalog Session Data
                  description: Captures the live on_search catalog payload dynamically
                  additionalProperties: true
                items:
                  type: array
                  title: 🛒 Cart Items
                  minItems: 1
                  maxItems: 5
                  items:
                    type: object
                    properties:
                      itemId:
                        type: string
                        title: Item
                        default: I1
                      quantity:
                        type: number
                        title: Quantity
                        minimum: 1
                        default: 1
                      location:
                        type: string
                        title: Location
                        default: L1
                      fulfillment_id:
                        type: string
                        title: Fulfillment
                        default: F1
                    required:
                      - itemId
                      - quantity
                available_offers:
                  type: array
                  title: 🎁 available_offers
                  description: Click 'Add Offer' to apply promotions
                  minItems: 0
                  maxItems: 5
                  items:
                    type: object
                    properties:
                      offerId:
                        type: string
                        title: Select Offer
                        oneOf:
                          - const: discp10
                            title: 10% Discount (discp10)
                          - const: flat150
                            title: Flat ₹150 Off (flat150)
                          - const: slab1
                            title: 15% Bulk Slab (slab1)
                          - const: slab2
                            title: 10% High Volume (slab2)
                          - const: freebie1
                            title: Free Gift (freebie1)
                          - const: buy2get3
                            title: Buy 2 Get 3 (buy2get3)
                    required:
                      - offerId
                phone_number:
                  type: string
                  title: Phone Number
                email:
                  type: string
                  format: email
                  title: Email Address
                tax_number:
                  type: string
                  title: GSTIN
                provider_tax_number:
                  type: string
                  title: PAN
                shop_name:
                  type: string
                  title: Shop Name
                address:
                  type: string
                  title: Address
                state_code:
                  type: string
                  title: State Code
              required:
                - type
                - city_code
                - items
        id: old_inputs
