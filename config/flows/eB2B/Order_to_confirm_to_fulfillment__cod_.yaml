      inputs:
        oldInputs:
          - name: reteb2b_select
            type: reteb2b_select
            schema:
              $schema: http://json-schema.org/draft-07/schema#
              type: object
              additionalProperties: false
              properties:
                type:
                  type: string
                  enum:
                    - new
                    - existing
                  description: Retailer registration type
                  default: existing
                customer_id:
                  type: string
                  default: CUST-2024-0015421
                city_code:
                  type: string
                  default: std:060
                items:
                  type: array
                  minItems: 1
                  maxItems: 3
                  items:
                    type: object
                    properties:
                      itemId:
                        type: string
                        default: I1
                      quantity:
                        type: number
                        default: 1
                      location:
                        type: string
                        default: L1
                      fulfillment_id:
                        type: string
                        default: F1
                available_offers:
                  type: array
                  description: "🎁 Select Offers (Note: Slab/Freebie/BuyXGetY are NON-ADDITIVE and
                    will override others)"
                  uniqueItems: true
                  items:
                    type: string
                    oneOf:
                      - const: discp10
                        title: "discp10: 10% Discount"
                        description: Applicable on Items I1-I4. Requires Min. Cart Value of ₹500.
                          [ADDITIVE]
                      - const: flat150
                        title: "flat150: Flat ₹150 Off"
                        description: Applicable on Items I5-I8. Requires Min. Cart Value of ₹1000.
                          [ADDITIVE]
                      - const: slab1
                        title: "slab1: 15% Bulk Slab"
                        description: Applicable on Item I5 only. Requires Quantity 10-19. [NON-ADDITIVE]
                      - const: slab2
                        title: "slab2: 10% High Volume Slab"
                        description: Applicable on Item I2 only. Requires Quantity 20+. [NON-ADDITIVE]
                      - const: freebie1
                        title: "freebie1: Free Gift Item"
                        description: Applicable on Item I1. Triggered at exactly 50 Units.
                          [NON-ADDITIVE]
                      - const: buy2get3
                        title: "buy2get3: Buy 2 Get 3"
                        description: Applicable on Items I1 or I2. Triggered at Quantity 2.
                          [NON-ADDITIVE]
                  default: []
                phone_number:
                  type: string
                email:
                  type: string
                  format: email
                tax_number:
                  type: string
                  title: GSTIN
                provider_tax_number:
                  type: string
                  title: PAN
                shop_name:
                  type: string
                address:
                  type: string
                state_code:
                  type: string
              required:
                - type
                - city_code
