      inputs:
        oldInputs:
          - name: RETINVL_Discovery_Input
            type: RETINVL_Discovery_Input
            schema:
              type: object
              properties:
                mode:
                  type: string
                  enum:
                    - CATEGORY
                    - PRODUCT
                cityCode:
                  type: string
                  pattern: ^std:\d{3}$
                gps:
                  type: string
                  pattern: ^[-+]?([1-8]?\d(\.\d+)?|90(\.0+)?),\s*[-+]?(180(\.0+)?|((1[0-7]\d)|([1-9]?\d))(\.\d+)?)$
                areaCode:
                  type: string
                  pattern: ^\d{6}$
                finderFeeType:
                  type: string
                  enum:
                    - percent
                    - amount
                finderFeeAmount:
                  type: string
                  pattern: ^[0-9]+(\.[0-9]{1,2})?$
              required:
                - mode
                - cityCode
                - gps
                - areaCode
                - finderFeeType
                - finderFeeAmount
              allOf:
                - if:
                    properties:
                      mode:
                        const: CATEGORY
                  then:
                    properties:
                      category:
                        type: string
                        minLength: 2
                        maxLength: 100
                    required:
                      - category
                - if:
                    properties:
                      mode:
                        const: PRODUCT
                  then:
                    properties:
                      productName:
                        type: string
                        minLength: 2
                        maxLength: 200
                    required:
                      - productName
        id: old_inputs
