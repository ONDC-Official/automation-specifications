        bppUri: $.context.bpp_uri
        city_code: $.context.location.city.code
      inputs:
        oldInputs:
          - name: city_code
            label: Enter city code
            type: text
            payloadField: $.context.location.city.code
          - name: start_location
            label: Enter start airport code
            type: text
            payloadField: $.message.intent.fulfillment.stops[0].location.descriptor.code
          - name: end_location
            label: Enter end airport code
            type: text
            payloadField: $.message.intent.fulfillment.stops[1].location.descriptor.code
          - name: category
            label: Select travel class
            type: select
            payloadField: $.message.intent.category.descriptor.code
            values:
              - ECONOMY
              - BUSINESS
              - FIRST_CLASS
          - name: adult_ticket_count
            label: Adult Ticket Count
            type: text
            payloadField: $.message.intent.provider.items[?(@.descriptor.code=='ADULT_TICKET')].quantity.count
          - name: child_ticket_count
            label: Child Ticket Count
            type: text
            required: false
            payloadField: $.message.intent.provider.items[?(@.descriptor.code=='CHILD_TICKET')].quantity.count
          - name: journey_date
            label: Enter Journey date (YYYY-MM-DD)
            type: date
            payloadField: $.message.intent.fulfillment.stops[0].time.timestamp
        id: old_inputs
