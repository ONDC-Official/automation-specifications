      - WORKBENCH
      - MANDATORY
      - REPORTABLE
    description: This flow illustrates the Reverse QC (QC) process for Logistics
      Service Providers (LSPs) to handle situations where the buyer is
      unavailable, an accident occurs, or other unforeseen circumstances arise
      while the rider is out for delivery.
    config:
      $ref: ./Logistics (P2H2P)/REVERSE_QC.yaml
