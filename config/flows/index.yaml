  - type: playground
    id: PICKUP_DELIVERY_ATTEMPT
    usecase: Logistics (P2H2P)
    tags:
      - WORKBENCH
      - MANDATORY
      - REPORTABLE
    description: This flow illustrates scenarios where the LSP initiates a pickup or
      delivery attempt but is unable to complete it due to reasons such as
      customer unavailability, restricted access, or operational constraints. In
      such cases, the LSP marks the attempt as failed, provides a reason code,
      and reschedules the task for a future date. All attempts, including
      timestamps, statuses, and reason codes, are recorded in the system to
      maintain a complete and auditable trail of logistics activity.
    config:
      $ref: ./Logistics (P2H2P)/PICKUP_DELIVERY_ATTEMPT.yaml
  - type: playground
    id: PREPAID_PAYMENT_FLOW
    usecase: Logistics (P2H2P)
    tags:
      - WORKBENCH
      - MANDATORY
      - REPORTABLE
    description: This flow illustrates the Payment Wallet process for Logistics
      Service Providers (LSPs), enabling them to establish a prepaid wallet
      system for logistics buyers. Payments for services are deducted directly
      from this wallet, ensuring a seamless and efficient transaction process.
    config:
      $ref: ./Logistics (P2H2P)/PREPAID_PAYMENT_FLOW.yaml
  - type: playground
    id: RATE_CARD (P2H2P)
