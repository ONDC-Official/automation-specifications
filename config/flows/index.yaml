      - WORKBENCH
      - MANDATORY
      - REPORTABLE
    description: This Flow outlines the process for confirming and updating
      logistics orders with the Logistics Service Provider (LSP) and the
      Logistics Buyer Network Partner (LBNP). Here the LBNP provides static OTP
      for pickup and delivery verification.
    config:
      $ref: ./Logistics (P2H2P)/STATIC_OTP_PICKUP_DELIVERY.yaml
  - type: playground
    id: STATIC_OTP_RTO_DELIVERY
    usecase: Logistics (P2H2P)
    tags:
      - PRAMAAN
      - MANDATORY
      - REPORTABLE
      - WORKBENCH
    description: Flow for Return to Origin (RTO) when buyer is unavailable or
      delivery fails. A separate RTO fulfillment is created and linked to the
      forward shipment. RTO quote is added before RTO completes. RTO ends with
      Delivered or Disposed, completing the order. Here LBNP provides static OTP
      for RTO delivery verification.
    config:
      $ref: ./Logistics (P2H2P)/STATIC_OTP_RTO_DELIVERY.yaml
